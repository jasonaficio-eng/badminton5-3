<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>賽程表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #e8c84a;
    --accent2: #4a9ee8;
    --text: #f0f0f5;
    --muted: #888899;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 4px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-bottom: 28px;
    letter-spacing: 2px;
  }

  /* Player filter */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* Grid layout */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: default;
  }

  .match-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .match-card.hidden { display: none; }

  .match-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--accent);
    min-width: 32px;
    text-align: center;
    letter-spacing: 1px;
  }

  .match-players {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .player {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 4px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
  }

  .vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--accent2);
    letter-spacing: 1px;
  }

  /* Score input */
  .score-area {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .score-input {
    width: 36px;
    height: 28px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    text-align: center;
    font-size: 0.9rem;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .score-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .score-sep {
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* Stats table */
  .stats-section {
    max-width: 700px;
    margin: 32px auto 0;
  }

  .stats-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--accent2);
    margin-bottom: 12px;
    text-align: center;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }

  th {
    background: rgba(232,200,74,0.12);
    color: var(--accent);
    padding: 9px 12px;
    text-align: center;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    letter-spacing: 1px;
  }

  td {
    padding: 8px 12px;
    text-align: center;
    border-bottom: 1px solid rgba(42,42,58,0.6);
  }

  tr:hover td { background: rgba(255,255,255,0.03); }

  .rank-1 td:first-child { color: var(--accent); font-weight: 900; }
  .rank-2 td:first-child { color: #c0c0c0; font-weight: 700; }
  .rank-3 td:first-child { color: #cd7f32; font-weight: 700; }

  .player-name-td { font-weight: 700; font-size: 0.95rem; }

  .win { color: #5dbb6a; }
  .loss { color: #e06060; }
  .pts { color: var(--accent); font-weight: 900; }
</style>
</head>
<body>

<h1>賽程表</h1>
<div class="subtitle">ROUND ROBIN · 45 MATCHES</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-player="all" onclick="filterPlayer(this, 'all')">全部</button>
</div>

<div class="grid" id="matchGrid"></div>

<div class="stats-section">
  <div class="stats-title">積分榜</div>
  <table id="statsTable">
    <thead>
      <tr>
        <th>#</th>
        <th>選手</th>
        <th>場次</th>
        <th>勝</th>
        <th>負</th>
        <th>積分</th>
      </tr>
    </thead>
    <tbody id="statsBody"></tbody>
  </table>
</div>

<script>
const matches = [
  {n:1,  a:"力豪", b:"森"},
  {n:2,  a:"文豪", b:"Jason Lee"},
  {n:3,  a:"維爾森", b:"Jj"},
  {n:4,  a:"店長", b:"Kira"},
  {n:5,  a:"香菇", b:"信"},
  {n:6,  a:"力豪", b:"Jason Lee"},
  {n:7,  a:"森", b:"Jj"},
  {n:8,  a:"文豪", b:"Kira"},
  {n:9,  a:"維爾森", b:"信"},
  {n:10, a:"店長", b:"香菇"},
  {n:11, a:"力豪", b:"Jj"},
  {n:12, a:"Jason Lee", b:"Kira"},
  {n:13, a:"森", b:"信"},
  {n:14, a:"文豪", b:"香菇"},
  {n:15, a:"維爾森", b:"店長"},
  {n:16, a:"力豪", b:"Kira"},
  {n:17, a:"Jj", b:"信"},
  {n:18, a:"Jason Lee", b:"香菇"},
  {n:19, a:"森", b:"店長"},
  {n:20, a:"文豪", b:"維爾森"},
  {n:21, a:"力豪", b:"信"},
  {n:22, a:"Kira", b:"香菇"},
  {n:23, a:"Jj", b:"店長"},
  {n:24, a:"Jason Lee", b:"維爾森"},
  {n:25, a:"森", b:"文豪"},
  {n:26, a:"力豪", b:"香菇"},
  {n:27, a:"信", b:"店長"},
  {n:28, a:"Kira", b:"維爾森"},
  {n:29, a:"Jj", b:"文豪"},
  {n:30, a:"Jason Lee", b:"森"},
  {n:31, a:"力豪", b:"店長"},
  {n:32, a:"香菇", b:"維爾森"},
  {n:33, a:"信", b:"文豪"},
  {n:34, a:"Kira", b:"森"},
  {n:35, a:"Jj", b:"Jason Lee"},
  {n:36, a:"力豪", b:"維爾森"},
  {n:37, a:"店長", b:"文豪"},
  {n:38, a:"香菇", b:"森"},
  {n:39, a:"信", b:"Jason Lee"},
  {n:40, a:"Kira", b:"Jj"},
  {n:41, a:"力豪", b:"文豪"},
  {n:42, a:"維爾森", b:"森"},
  {n:43, a:"店長", b:"Jason Lee"},
  {n:44, a:"香菇", b:"Jj"},
  {n:45, a:"信", b:"Kira"},
];

const players = [...new Set(matches.flatMap(m => [m.a, m.b]))].sort();
const scores = {};

function saveScores() {
  localStorage.setItem('matchScores', JSON.stringify(scores));
}

function loadScores() {
  try {
    const s = localStorage.getItem('matchScores');
    if (s) Object.assign(scores, JSON.parse(s));
  } catch(e) {}
}

function buildFilters() {
  const f = document.getElementById('filters');
  players.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = p;
    btn.dataset.player = p;
    btn.onclick = () => filterPlayer(btn, p);
    f.appendChild(btn);
  });
}

function filterPlayer(btn, player) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.match-card').forEach(card => {
    if (player === 'all' || card.dataset.players.includes(player)) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });
}

function buildGrid() {
  const grid = document.getElementById('matchGrid');
  matches.forEach(m => {
    const key = `m${m.n}`;
    const card = document.createElement('div');
    card.className = 'match-card';
    card.dataset.players = `${m.a}|${m.b}`;

    const sa = (scores[key] || {}).a ?? '';
    const sb = (scores[key] || {}).b ?? '';

    card.innerHTML = `
      <div class="match-num">${m.n}</div>
      <div class="match-players">
        <div class="player">${m.a}</div>
        <div class="vs">VS</div>
        <div class="player">${m.b}</div>
      </div>
      <div class="score-area">
        <input class="score-input" type="number" min="0" max="99" value="${sa}" placeholder="-" data-key="${key}" data-side="a">
        <span class="score-sep">:</span>
        <input class="score-input" type="number" min="0" max="99" value="${sb}" placeholder="-" data-key="${key}" data-side="b">
      </div>
    `;
    grid.appendChild(card);
  });

  grid.addEventListener('input', e => {
    if (!e.target.classList.contains('score-input')) return;
    const key = e.target.dataset.key;
    const side = e.target.dataset.side;
    if (!scores[key]) scores[key] = {};
    scores[key][side] = e.target.value;
    saveScores();
    updateStats();
  });
}

function updateStats() {
  const stat = {};
  players.forEach(p => { stat[p] = {played:0, win:0, loss:0, pts:0}; });

  matches.forEach(m => {
    const key = `m${m.n}`;
    const s = scores[key] || {};
    if (s.a !== undefined && s.b !== undefined && s.a !== '' && s.b !== '') {
      const sa = parseInt(s.a), sb = parseInt(s.b);
      stat[m.a].played++;
      stat[m.b].played++;
      if (sa > sb) {
        stat[m.a].win++; stat[m.a].pts += 3;
        stat[m.b].loss++;
      } else if (sb > sa) {
        stat[m.b].win++; stat[m.b].pts += 3;
        stat[m.a].loss++;
      } else {
        stat[m.a].pts++; stat[m.b].pts++;
      }
    }
  });

  const sorted = players.slice().sort((a,b) => {
    if (stat[b].pts !== stat[a].pts) return stat[b].pts - stat[a].pts;
    return stat[b].win - stat[a].win;
  });

  const tbody = document.getElementById('statsBody');
  tbody.innerHTML = '';
  sorted.forEach((p, i) => {
    const s = stat[p];
    const tr = document.createElement('tr');
    if (i===0) tr.className='rank-1';
    else if (i===1) tr.className='rank-2';
    else if (i===2) tr.className='rank-3';
    tr.innerHTML = `
      <td>${i+1}</td>
      <td class="player-name-td">${p}</td>
      <td>${s.played}</td>
      <td class="win">${s.win}</td>
      <td class="loss">${s.loss}</td>
      <td class="pts">${s.pts}</td>
    `;
    tbody.appendChild(tr);
  });
}

loadScores();
buildFilters();
buildGrid();
updateStats();
</script>
</body>
</html>
